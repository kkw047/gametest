<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>티카투카 간단 추천기</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#0c1018;color:#f4f6fb;font-family:system-ui,-apple-system,Segoe UI,sans-serif}header{padding:14px 18px;background:#111722;border-bottom:1px solid #30384d}h1{font-size:19px;margin:0}p,.small{font-size:12px;color:#aeb7ca;line-height:1.55}.wrap{max-width:1380px;margin:auto;padding:12px;display:grid;grid-template-columns:1fr 420px;gap:12px}.card{background:#171c28;border:1px solid #30384d;border-radius:14px;padding:12px}h2{font-size:16px;margin:0 0 10px}h3{font-size:13px;margin:12px 0 7px}.row{display:flex;gap:7px;align-items:center;flex-wrap:wrap}.between{justify-content:space-between}.video{position:relative;aspect-ratio:16/9;background:#020306;border:1px solid #3a455e;border-radius:12px;overflow:hidden}.video video,.video canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}.video canvas{pointer-events:auto}.empty{position:absolute;inset:0;display:grid;place-items:center;text-align:center;color:#78849a;line-height:1.5}.video.on .empty{display:none}button,select,input{background:#202638;color:#f4f6fb;border:1px solid #3e4860;border-radius:9px;padding:7px 9px;font-size:13px}button{font-weight:800;cursor:pointer}.primary{background:#1f6a33;border-color:#2f914a}.danger{background:#5b2424;border-color:#8e3939}.badge{display:inline-block;border:1px solid #46516b;background:#293145;border-radius:999px;padding:3px 8px;font-size:12px}.good{color:#7de38c}.warn{color:#ffd166}.bad{color:#ff8080}.note{background:#111722;border:1px solid #33405a;border-radius:10px;padding:9px;margin:9px 0;color:#dbe3f4}.ctrl{display:grid;grid-template-columns:1fr 1fr;gap:7px}.field{display:grid;gap:4px}.field label{font-size:12px;color:#aeb7ca}.field select,.field input,.field button{width:100%}.board{display:grid;grid-template-columns:1fr 1fr;gap:8px}.bpanel{background:#111722;border:1px solid #30384d;border-radius:10px;padding:8px}.brow{display:grid;grid-template-columns:26px repeat(3,1fr);gap:4px;margin:5px 0}.brow span{font-size:11px;color:#aeb7ca;text-align:center;padding-top:7px}.brow select{padding:6px 2px}.scores{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}.score{background:#0f1420;border:1px solid #30384d;border-radius:9px;text-align:center;padding:6px}.score span{display:block;color:#aeb7ca;font-size:10px}.score b{font-size:16px}.chips{background:#10151f;border:1px solid #37445e;border-radius:10px;padding:8px;margin:8px 0}.chip{display:inline-block;background:#293145;border:1px solid #46516b;border-radius:999px;padding:4px 9px;margin:2px;font-weight:800}.result{background:#10151f;border:1px solid #37445e;border-radius:12px;padding:12px;min-height:130px}.best{font-size:18px;font-weight:950}.rate{font-size:28px;font-weight:950;color:#7de38c}.log{height:130px;overflow:auto;background:#080b11;border:1px solid #30384d;border-radius:10px;padding:8px;color:#aeb7ca;font:11px ui-monospace,Consolas,monospace;white-space:pre-wrap}table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}th,td{border-bottom:1px solid #30384d;padding:6px;text-align:left}td:nth-child(3),th:nth-child(3){text-align:right}.hit{background:rgba(125,227,140,.1)}#hidden{display:none}@media(max-width:980px){.wrap{grid-template-columns:1fr}.board,.ctrl{grid-template-columns:1fr}}

<body>
<header><h1>티카투카 간단 추천기</h1><p>일반 턴은 무조건 자기 보드만 배치합니다. 상대 보드 배치는 알까기 보상 보호 주사위 단계에서만 허용됩니다.</p></header>
<div class="wrap">
<section class="card">
<div class="row between"><h2>화면 분석</h2><span id="cap" class="badge">대기</span></div>
<div id="vbox" class="video"><div class="empty">화면 공유 시작 후<br>게임 화면을 선택하세요.</div><video id="video" autoplay muted playsinline></video><canvas id="ov"></canvas></div><canvas id="hidden"></canvas>
<div class="row" style="margin-top:8px"><button id="share" class="primary">화면 공유</button><button id="stop" class="danger">중지</button><button id="analyze">분석</button><label class="small"><input id="auto" type="checkbox"> 자동</label><label class="small"><input id="autoCalc" type="checkbox" checked> 변경 시 계산</label></div>
<div class="note small"><b>보정:</b> 보정 켜기 → 영역 선택 → 노란 박스 드래그. 현재 주사위 칸은 일반 턴이면 항상 일반 주사위로 처리합니다.</div>
<div class="ctrl"><div class="field"><label>보정</label><select id="edit"><option value="0">끄기</option><option value="1">켜기</option></select></div><div class="field"><label>영역</label><select id="target"></select></div><div class="field"><label>자동 간격</label><select id="interval"><option value="6000">6초</option><option value="8000" selected>8초</option><option value="12000">12초</option></select></div><div class="field"><label>밝기</label><input id="th" type="range" min="120" max="230" value="165"></div><div class="field"><label>최소 면적</label><input id="minarea" type="range" min="80" max="1200" value="220"></div><div class="field"><label>영역</label><button id="resetArea">초기화</button></div></div>
<h3>로그</h3><div id="log" class="log">대기 중...</div>
</section>
<section class="card">
<div class="row between"><h2>상태 / 추천</h2><span id="work" class="badge">대기</span></div>
<div class="chips"><div class="small">현재 주사위 후보</div><div id="chips"><span class="chip">수동</span></div></div>
<div class="ctrl"><div class="field"><label>단계</label><select id="phase"><option value="MAIN">일반 턴</option><option value="BONUS">보상 보호 배치</option></select></div><div class="field"><label>턴</label><select id="turn"><option value="ME">나</option><option value="OPP">상대</option></select></div><div class="field"><label>수동 눈</label><select id="dv"></select></div><div class="field"><label>수동 종류</label><select id="dt"><option value="N">일반</option><option value="S">보호</option></select></div><div class="field"><label>내 리롤</label><select id="mr"><option value="1">가능</option><option value="0">사용함</option></select></div><div class="field"><label>탐색</label><select id="depth"><option value="2">2 초고속</option><option value="3" selected>3 권장</option><option value="4">4 느림</option></select></div></div>
<h3>보드</h3><div class="board"><div class="bpanel"><b>내 보드</b><div id="my"></div></div><div class="bpanel"><b>상대 보드</b><div id="op"></div></div></div>
<div class="scores"><div class="score"><span>내 점수</span><b id="ms">0</b></div><div class="score"><span>상대 점수</span><b id="os">0</b></div><div class="score"><span>줄 승</span><b id="lw">0:0</b></div></div>
<div class="row" style="margin-top:10px"><button id="go" class="primary">계산</button><button id="useManual">수동 주사위</button><button id="clear">초기화</button></div>
<h3>결과</h3><div id="res" class="result"><div class="small">분석 또는 수동 입력 후 계산하세요.</div></div>
</section>
</div>
<script id="wk" type="javascript/worker">
'use strict';
const V=c=>c?((c-1)%6)+1:0,SC=v=>v+6,CL=b=>b.map(r=>r.slice()),RW=r=>r.filter(Boolean).slice(0,3),NT=t=>t==='ME'?'OPP':'ME';
let START=0,APP=false;const LIMIT=25000,MS=950,MARGIN=.05;
function SL(r){let n=[0,0,0,0,0,0,0];for(const c of r||[])if(c)n[V(c)]++;let s=0;for(let i=1;i<=6;i++)s+=i*n[i]*n[i];return s}
function TS(b){return b.reduce((s,r)=>s+SL(r),0)}function LW(m,o){let a=0,b=0;for(let i=0;i<3;i++){let x=SL(m[i]||[]),y=SL(o[i]||[]);if(x>y)a++;else if(y>x)b++}return[a,b]}function FB(b){return b.every(r=>(r||[]).length>=3)}function TERM(s){return FB(s.my)&&FB(s.op)}function sig(x){return 1/(1+Math.exp(-x))}
function swing(m,o,i){let p=0,r=0;if((m[i]||[]).length<3)for(const c of o[i]||[])if(c<=6)p+=SL(o[i])-SL((o[i]||[]).filter(x=>!(x<=6&&V(x)===V(c))));if((o[i]||[]).length<3)for(const c of m[i]||[])if(c<=6)r+=SL(m[i])-SL((m[i]||[]).filter(x=>!(x<=6&&V(x)===V(c))));return[p,r]}
function EV(s){let w=LW(s.my,s.op);if(TERM(s)){if(w[0]>w[1])return 1;if(w[1]>w[0])return 0;let d=TS(s.my)-TS(s.op);return d>0?1:d<0?0:.5}let p=[];for(let i=0;i<3;i++){let d=SL(s.my[i])-SL(s.op[i]),sp=(3-(s.my[i]||[]).length)-(3-(s.op[i]||[]).length),sw=swing(s.my,s.op,i);p[i]=sig(.12*d+.18*sp+.045*sw[0]-.06*sw[1])}let p2=p[0]*p[1]+p[0]*p[2]+p[1]*p[2]-2*p[0]*p[1]*p[2];return Math.max(0,Math.min(1,.9*p2+.1*sig((TS(s.my)-TS(s.op))/22)))}
function budget(m){if(m.size>LIMIT||Date.now()-START>MS){APP=true;return true}return false}function AB(s){return s.turn==='ME'?s.my:s.op}function PB(s){return s.turn==='ME'?s.op:s.my}function SET(s,a,p){if(s.turn==='ME'){s.my=a;s.op=p}else{s.op=a;s.my=p}}function RR(s){return s.turn==='ME'?s.mr:false}
function legal(s,d){let a=AB(s),p=PB(s),r=[];for(let i=0;i<3;i++)if((a[i]||[]).length<3)r.push({target:'SELF',row:i,d});if(s.phase==='BONUS_PLACE'&&d.t==='S')for(let i=0;i<3;i++)if((p[i]||[]).length<3)r.push({target:'OPP',row:i,d});return r}
function apply(s,A){let n={my:CL(s.my),op:CL(s.op),turn:s.turn,phase:'ROLL',choices:[],mr:s.mr},a=AB(n),p=PB(n),dc=A.d.t==='S'?SC(A.d.v):A.d.v,rm=0;if(A.target==='SELF'){a[A.row]=RW([...(a[A.row]||[]),dc]);if(s.phase==='MAIN'){let v=A.d.v,bf=(p[A.row]||[]).length;p[A.row]=(p[A.row]||[]).filter(c=>!(c<=6&&V(c)===v));rm=bf-p[A.row].length}SET(n,a,p);if(s.phase==='MAIN'&&rm>0){n.phase='BONUS_ROLL';return{n,rm}}}else{if(s.phase!=='BONUS_PLACE')return null;p[A.row]=RW([...(p[A.row]||[]),dc]);SET(n,a,p)}n.turn=NT(s.turn);return{n,rm}}
function key(s,d){return JSON.stringify([s.my,s.op,s.turn,s.phase,s.choices,s.mr,d])}
function solve(s,d,M){if(FB(AB(s))&&!TERM(s))s={...s,turn:NT(s.turn),phase:'ROLL',choices:[]};if(budget(M)||d<=0||TERM(s))return EV(s);let k=key(s,d);if(M.has(k))return M.get(k);let v;if(s.phase==='ROLL'){v=0;for(let i=1;i<=6;i++)v+=solve({...s,phase:'MAIN',choices:[{v:i,t:'N'}]},d,M)/6;M.set(k,v);return v}if(s.phase==='BONUS_ROLL'){v=0;for(let i=1;i<=6;i++)v+=solve({...s,phase:'BONUS_PLACE',choices:[{v:i,t:'S'}]},d,M)/6;M.set(k,v);return v}let vals=[];for(const dc of s.choices||[])for(const a of legal(s,dc)){let z=apply(s,a);if(z)vals.push(solve(z.n,d-1,M))}if(s.phase==='MAIN'&&RR(s)&&s.choices.length===1){let rv=reroll(s,d,M),best=vals.length?Math.max(...vals):EV(s);if(rv>best+MARGIN)vals.push(rv)}v=vals.length?(s.turn==='ME'?Math.max(...vals):Math.min(...vals)):EV(s);M.set(k,v);return v}
function reroll(s,d,M){let old=s.choices[0],b={...s,mr:false},sum=0;for(let r=1;r<=6;r++)sum+=solve({...b,phase:'MAIN',choices:[old,{v:r,t:'N'}]},d,M);return sum/6}
function desc(a){let side=a.target==='OPP'?'상대 보드':'자기 보드',tag=a.target==='OPP'?'보상 보호 ':'';return `${tag}${a.d.v}${a.d.t} → ${side} ${a.row+1}줄`}
onmessage=e=>{START=Date.now();APP=false;let s=e.data.s,d=e.data.d,M=new Map(),out=[];for(const dc of s.choices||[])for(const a of legal(s,dc)){let z=apply(s,a);if(z)out.push({tx:desc(a),v:solve(z.n,d-1,M),n:z.rm?`알까기 ${z.rm}개`:'',rs:[a.target==='OPP'?'보상 보호 단계라 상대 보드 배치를 허용했습니다.':'일반 턴은 자기 보드 배치만 허용합니다.',z.rm?'알까기 후 보상 보호 주사위 확률까지 계산했습니다.':'가득 찬 줄은 후보에서 제외했습니다.']})}if(s.phase==='MAIN'&&RR(s)&&s.choices.length===1){let rv=reroll(s,d,M),best=out.length?Math.max(...out.map(x=>x.v)):EV(s);out.push({tx:'리롤 '+(rv>best+MARGIN?'사용':'보류 권장'),v:rv,n:rv>best+MARGIN?'가치 있음':'차이 작음',rs:[rv>best+MARGIN?'현재 수보다 리롤 기대값이 충분히 높습니다.':'현재 수가 충분히 좋아 리롤은 아끼는 쪽입니다.']})}out.sort((a,b)=>s.turn==='ME'?b.v-a.v:a.v-b.v);postMessage({out,nodes:M.size,approx:APP,time:Date.now()-START})};
</script>
<script>
'use strict';
const $=id=>document.getElementById(id);let stream=null,timer=null,worker=null,marks=[],choices=[],drag=null,lastSig='',calcTimer=null,busy=false;
const names={D:'현재 주사위',ME0:'내 1줄',ME1:'내 2줄',ME2:'내 3줄',OPP0:'상대 1줄',OPP1:'상대 2줄',OPP2:'상대 3줄',MR:'내 리롤 버튼'};
const def={D:[.118,.397,.122,.367],ME0:[.246,.398,.210,.108],ME1:[.246,.527,.210,.108],ME2:[.246,.653,.210,.108],OPP0:[.536,.398,.210,.108],OPP1:[.536,.527,.210,.108],OPP2:[.536,.653,.210,.108],MR:[.129,.771,.099,.042]};let areas=loadAreas();
function loadAreas(){try{return Object.assign({},def,JSON.parse(localStorage.getItem('tika_simple_areas')||'{}'))}catch(e){return {...def}}}function saveAreas(){localStorage.setItem('tika_simple_areas',JSON.stringify(areas));log('영역 저장')}
function log(m){$('log').textContent='['+new Date().toLocaleTimeString()+'] '+m+'\n'+$('log').textContent.slice(0,3000)}function stat(id,t,c=''){$(id).textContent=t;$(id).className='badge '+c}function val(c){return c?((c-1)%6)+1:0}function code(v,t){return t==='S'?v+6:v}function txt(c){return c?val(c)+(c>6?'S':'N'):'0'}function parse(s){if(!s||s==='0')return 0;let v=parseInt(s,10);return s.endsWith('S')?v+6:v}function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function build(){let opt='<option value="0">__</option>';for(let i=1;i<=6;i++)opt+=`<option value="${i}N">${i}N</option>`;for(let i=1;i<=6;i++)opt+=`<option value="${i}S">${i}S</option>`;for(const k in names)$('target').innerHTML+=`<option value="${k}">${names[k]}</option>`;for(const p of ['my','op'])for(let r=0;r<3;r++){let d=document.createElement('div');d.className='brow';d.innerHTML='<span>'+(r+1)+'</span>';for(let c=0;c<3;c++){let s=document.createElement('select');s.id=p+r+c;s.innerHTML=opt;s.onchange=()=>{score();changed('보드 변경')};d.appendChild(s)}$(p).appendChild(d)}for(let i=1;i<=6;i++)$('dv').innerHTML+=`<option value="${i}">${i}</option>`}
function board(p){let b=[];for(let r=0;r<3;r++){let a=[];for(let c=0;c<3;c++){let x=parse($(p+r+c).value);if(x)a.push(x)}b.push(a.slice(0,3))}return b}function setBoard(p,b){for(let r=0;r<3;r++)for(let c=0;c<3;c++)$(p+r+c).value=txt((b[r]||[])[c]||0);score()}function SL(r){let n=[0,0,0,0,0,0,0];for(const c of r||[])if(c)n[val(c)]++;let s=0;for(let i=1;i<=6;i++)s+=i*n[i]*n[i];return s}function score(){let m=board('my'),o=board('op'),ms=0,os=0,a=0,b=0;for(let i=0;i<3;i++){let x=SL(m[i]),y=SL(o[i]);ms+=x;os+=y;if(x>y)a++;else if(y>x)b++}$('ms').textContent=ms;$('os').textContent=os;$('lw').textContent=a+':'+b}
function effectiveChoices(){let ph=$('phase').value;return choices.length?choices.map(x=>({v:x.v,t:ph==='BONUS'?'S':x.t||'N'})):[{v:+$('dv').value,t:ph==='BONUS'?'S':$('dt').value}]}
function showChoices(){let cs=effectiveChoices();$('chips').innerHTML=cs.map(x=>`<span class="chip">${x.v}${x.t}</span>`).join('')}
function setChoices(list){choices=list.map(x=>({v:x.v,t:x.t||'N'}));if(choices[0]){$('dv').value=choices[0].v;$('dt').value=choices[0].t}showChoices()}
function state(){return{my:board('my'),op:board('op'),turn:$('turn').value,phase:$('phase').value==='BONUS'?'BONUS_PLACE':'MAIN',choices:effectiveChoices(),mr:$('mr').value==='1'}}function sig(){return JSON.stringify(state())}function changed(why){showChoices();let s=sig();if(s===lastSig)return;lastSig=s;log(why+' → 계산 예약');if($('autoCalc').checked){clearTimeout(calcTimer);calcTimer=setTimeout(calc,800)}}
async function start(){stop(false);try{stream=await navigator.mediaDevices.getDisplayMedia({video:{frameRate:8},audio:false});let v=$('video');v.srcObject=stream;stream.getVideoTracks()[0].onended=()=>stop(true);await new Promise(r=>v.onloadedmetadata=r);await v.play();$('vbox').classList.add('on');stat('cap','공유 중','good');draw();log('공유 시작 '+v.videoWidth+'x'+v.videoHeight)}catch(e){stat('cap','실패','bad');log(e.message)}}function stop(ended){if(timer)clearTimeout(timer);$('auto').checked=false;if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}$('video').srcObject=null;$('vbox').classList.remove('on');stat('cap',ended?'종료':'대기')}
function vrect(){let v=$('video'),b=$('vbox').getBoundingClientRect(),ar=v.videoWidth&&v.videoHeight?v.videoWidth/v.videoHeight:16/9,bar=b.width/b.height,x=0,y=0,w=b.width,h=b.height;if(ar>bar){h=w/ar;y=(b.height-h)/2}else{w=h*ar;x=(b.width-w)/2}return{x,y,w,h}}function toCss(a){let r=vrect();return{x:r.x+a[0]*r.w,y:r.y+a[1]*r.h,w:a[2]*r.w,h:a[3]*r.h}}function draw(){let c=$('ov'),b=$('vbox').getBoundingClientRect(),d=devicePixelRatio||1;c.width=b.width*d;c.height=b.height*d;let g=c.getContext('2d');g.setTransform(d,0,0,d,0,0);g.clearRect(0,0,b.width,b.height);g.font='12px system-ui';for(const k in areas){let a=toCss(areas[k]),on=k===$('target').value,col=k.startsWith('ME')?'#7de38c':k.startsWith('OPP')?'#ff8080':k==='D'?'#ffd166':'#8bb9ff';g.strokeStyle=on?'#ffff66':col;g.fillStyle=on?'#ffff66':col;g.lineWidth=on?3:2;g.strokeRect(a.x,a.y,a.w,a.h);g.fillText(names[k],a.x+3,a.y-3);if(on)g.fillRect(a.x+a.w-8,a.y+a.h-8,8,8)}for(const m of marks){let a=toCss(m.box);g.strokeStyle=m.t==='S'?'#ffd166':'#8bb9ff';g.lineWidth=3;g.strokeRect(a.x,a.y,a.w,a.h);g.fillStyle='#fff';g.fillText(m.v+m.t,a.x+2,a.y+12)}}window.onresize=draw;
function frame(){let v=$('video');if(!v.videoWidth)throw Error('영상 준비 전');let c=$('hidden'),w=Math.min(720,v.videoWidth),h=Math.round(v.videoHeight*w/v.videoWidth);c.width=w;c.height=h;let g=c.getContext('2d',{willReadFrequently:true});g.drawImage(v,0,0,w,h);return{g,w,h}}function crop(ctx,k){let a=areas[k],x=Math.round(a[0]*ctx.w),y=Math.round(a[1]*ctx.h),w=Math.max(1,Math.round(a[2]*ctx.w)),h=Math.max(1,Math.round(a[3]*ctx.h));return{x,y,w,h,img:ctx.g.getImageData(x,y,w,h)}}function hsv(r,g,b){r/=255;g/=255;b/=255;let M=Math.max(r,g,b),m=Math.min(r,g,b),d=M-m,h=0;if(d){if(M===r)h=((g-b)/d)%6;else if(M===g)h=(b-r)/d+2;else h=(r-g)/d+4;h/=6;if(h<0)h+=1}return{h,s:M?d/M:0,v:M}}function green(r,g,b){let x=hsv(r,g,b);return x.h>.15&&x.h<.44&&x.s>.23&&x.v>.18}function red(r,g,b){let x=hsv(r,g,b);return(x.h<.065||x.h>.94)&&x.s>.30&&x.v>.25}function side(r,g,b,sd){return sd==='OPP'?red(r,g,b):green(r,g,b)}function white(r,g,b){let t=+$('th').value;return r>t&&g>t-25&&b>t-55&&Math.max(r,g,b)-Math.min(r,g,b)<115}
function comps(mask,w,h){let seen=new Uint8Array(w*h),out=[];for(let y=0;y<h;y++)for(let x=0;x<w;x++){let i=y*w+x;if(!mask[i]||seen[i])continue;let q=[i],h0=0,c=0,x1=x,x2=x,y1=y,y2=y,sx=0,sy=0;seen[i]=1;while(h0<q.length){let k=q[h0++],X=k%w,Y=(k/w)|0;c++;sx+=X;sy+=Y;if(X<x1)x1=X;if(X>x2)x2=X;if(Y<y1)y1=Y;if(Y>y2)y2=Y;for(const d of [1,-1,w,-w]){let n=k+d,nx=n%w,ny=(n/w)|0;if(n>=0&&n<w*h&&Math.abs(nx-X)+Math.abs(ny-Y)===1&&mask[n]&&!seen[n]){seen[n]=1;q.push(n)}}}out.push({x:x1,y:y1,w:x2-x1+1,h:y2-y1+1,a:c,cx:sx/c,cy:sy/c})}return out}
function detect(ctx,key,sd){let p=crop(ctx,key),D=p.img.data,mask=new Uint8Array(p.w*p.h);for(let i=0,j=0;i<D.length;i+=4,j++)if(white(D[i],D[i+1],D[i+2]))mask[j]=1;return comps(mask,p.w,p.h).filter(c=>{let asp=c.w/Math.max(1,c.h);return c.a>+$('minarea').value&&c.w>12&&c.h>12&&c.w<105&&c.h<105&&asp>.45&&asp<1.9}).sort((a,b)=>a.x===b.x?a.y-b.y:a.x-b.x).slice(0,3).map(b=>readDie(p,b,key,sd,ctx))}
function readDie(p,b,key,sd,ctx){let D=p.img.data,w=p.w,x0=b.x,y0=b.y,x1=b.x+b.w,y1=b.y+b.h,bw=b.w,bh=b.h,bc=0,bt=0,band=Math.max(3,Math.round(Math.min(bw,bh)*.12));for(let y=y0;y<y1;y++)for(let x=x0;x<x1;x++){let e=x-x0<band||x1-x<=band||y-y0<band||y1-y<=band;if(!e)continue;let i=(y*w+x)*4;bt++;if(side(D[i],D[i+1],D[i+2],sd))bc++}let shield=key==='D'?false:(bt?bc/bt:0)>(sd==='OPP'?.018:.008),ix=Math.round(x0+bw*.13),iy=Math.round(y0+bh*.13),iw=Math.max(1,Math.round(bw*.74)),ih=Math.max(1,Math.round(bh*.74)),m=new Uint8Array(iw*ih);for(let y=0;y<ih;y++)for(let x=0;x<iw;x++){let i=((iy+y)*w+ix+x)*4;if(side(D[i],D[i+1],D[i+2],sd))m[y*iw+x]=1}let cc=comps(m,iw,ih).filter(c=>c.a>=4&&c.a<=Math.max(230,iw*ih*.2)),slots=new Set(),anc=[[.28,.28,'tl'],[.72,.28,'tr'],[.5,.5,'c'],[.28,.72,'bl'],[.72,.72,'br'],[.28,.5,'ml'],[.72,.5,'mr']];let total=cc.reduce((s,c)=>s+c.a,0),minx=999,miny=999,maxx=0,maxy=0;for(const c of cc){minx=Math.min(minx,c.x);miny=Math.min(miny,c.y);maxx=Math.max(maxx,c.x+c.w);maxy=Math.max(maxy,c.y+c.h);let px=c.cx/iw,py=c.cy/ih,best=null,bd=9;for(const a of anc){let d=(px-a[0])*(px-a[0])+(py-a[1])*(py-a[1]);if(d<bd){bd=d;best=a[2]}}if(bd<.105)slots.add(best)}let bwc=maxx-minx,bhc=maxy-miny,cx=(minx+maxx)/2/iw,cy=(miny+maxy)/2/ih,v=slots.size;if(total>10&&cc.length<=4&&bwc<iw*.55&&bhc<ih*.65&&cx>.30&&cx<.70&&cy>.25&&cy<.78)v=1;v=Math.max(1,Math.min(6,v));let a=areas[key];return{v,t:shield?'S':'N',box:[a[0]+(p.x+b.x)/ctx.w,a[1]+(p.y+b.y)/ctx.h,b.w/ctx.w,b.h/ctx.h]}}
function reroll(ctx){let p=crop(ctx,'MR'),D=p.img.data,gr=0,tot=0;for(let i=0;i<D.length;i+=4){tot++;if(green(D[i],D[i+1],D[i+2]))gr++}return gr/tot>.05}
async function analyze(){if(busy)return;busy=true;try{let ctx=frame(),m=[[],[],[]],o=[[],[],[]];marks=[];for(let i=0;i<3;i++){let a=detect(ctx,'ME'+i,'ME'),b=detect(ctx,'OPP'+i,'OPP');marks.push(...a,...b);m[i]=a.map(d=>code(d.v,d.t));o[i]=b.map(d=>code(d.v,d.t))}let cur=detect(ctx,'D','ME').sort((a,b)=>a.box[1]-b.box[1]).slice(0,2),seen=m.flat().length+o.flat().length+cur.length;if(!seen){draw();log('감지 0개: 기존 상태 유지');busy=false;return}marks.push(...cur);if(cur.length){setChoices(cur.map(d=>({v:d.v,t:$('phase').value==='BONUS'?'S':'N'})));$('turn').value='ME'}$('mr').value=(reroll(ctx)&&cur.length<2)?'1':'0';setBoard('my',m);setBoard('op',o);draw();log('분석: 내 '+m.map(x=>x.length).join('/')+' 상대 '+o.map(x=>x.length).join('/')+' 현재 '+(cur.length?cur.map(x=>x.v+($('phase').value==='BONUS'?'S':'N')).join(','):'없음'));changed('분석 결과')}catch(e){log('분석 실패: '+e.message)}busy=false}
function auto(){if(timer)clearTimeout(timer);if(!$('auto').checked)return;let loop=async()=>{if(!$('auto').checked)return;await analyze();timer=setTimeout(loop,+$('interval').value)};timer=setTimeout(loop,1200);log('자동 분석 시작')}
function calc(){if(worker)worker.terminate();stat('work','계산 중','warn');$('go').disabled=true;worker=new Worker(URL.createObjectURL(new Blob([$('wk').textContent],{type:'text/javascript'})));worker.onmessage=e=>{$('go').disabled=false;stat('work','완료','good');let d=e.data;if(worker){worker.terminate();worker=null}render(d)};worker.onerror=e=>{$('go').disabled=false;stat('work','오류','bad');$('res').innerHTML='<div class="bad">'+esc(e.message)+'</div>';if(worker){worker.terminate();worker=null}};worker.postMessage({s:state(),d:+$('depth').value})}
function render(d){let a=d.out;if(!a||!a.length){$('res').innerHTML='<div class="bad">가능한 합법 수가 없습니다.</div>';return}let b=a[0],html='<div class="small">상태 '+d.nodes+'개 / '+d.time+'ms'+(d.approx?' / 근사':'')+'</div><div class="best">추천: '+esc(b.tx)+'</div><div class="rate">'+(Math.round(b.v*1000)/10)+'%</div><ol>'+b.rs.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ol><table><tr><th>#</th><th>후보</th><th>승률</th><th>비고</th></tr>';a.forEach((x,i)=>html+='<tr class="'+(i?'':'hit')+'"><td>'+(i+1)+'</td><td>'+esc(x.tx)+'</td><td>'+Math.round(x.v*1000)/10+'%</td><td>'+esc(x.n||'')+'</td></tr>');$('res').innerHTML=html+'</table>';log('계산 완료: '+b.tx)}
$('ov').onmousedown=e=>{if($('edit').value!=='1')return;let k=$('target').value,a=toCss(areas[k]),r=$('vbox').getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top,resize=Math.abs(x-(a.x+a.w))<16&&Math.abs(y-(a.y+a.h))<16;drag={k,resize,ox:x,oy:y,start:areas[k].slice()};e.preventDefault()};window.onmousemove=e=>{if(!drag)return;let r=$('vbox').getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top,vr=vrect(),dx=(x-drag.ox)/vr.w,dy=(y-drag.oy)/vr.h,a=drag.start.slice();if(drag.resize){a[2]=Math.max(.025,a[2]+dx);a[3]=Math.max(.025,a[3]+dy)}else{a[0]=Math.max(0,Math.min(.98,a[0]+dx));a[1]=Math.max(0,Math.min(.98,a[1]+dy))}areas[drag.k]=a;draw()};window.onmouseup=()=>{if(drag){saveAreas();drag=null;analyze()}};
$('share').onclick=start;$('stop').onclick=()=>stop(false);$('analyze').onclick=analyze;$('auto').onchange=auto;$('interval').onchange=auto;$('go').onclick=calc;$('useManual').onclick=()=>{setChoices([{v:+$('dv').value,t:$('phase').value==='BONUS'?'S':$('dt').value}]);changed('수동 주사위')};$('clear').onclick=()=>{setBoard('my',[[],[],[]]);setBoard('op',[[],[],[]]);choices=[];showChoices();changed('초기화')};$('resetArea').onclick=()=>{areas={...def};saveAreas();draw()};$('target').onchange=draw;$('edit').onchange=()=>{draw();log($('edit').value==='1'?'보정 켜짐':'보정 꺼짐')};for(const id of ['phase','turn','dv','dt','mr','depth'])$(id).addEventListener('change',()=>changed('필드 변경'));
